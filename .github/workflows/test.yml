name: Test Mock Detection

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker (mock mode)
        env:
          SIASISTEN_USERNAME: ${{ secrets.SIASISTEN_USERNAME }}
          SIASISTEN_PASSWORD: ${{ secrets.SIASISTEN_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_HTML_PATH: test_data/listings_mock.html
        run: python -m src.main

      - name: Persist state
        run: |
          git config user.name  "siasisten-war-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push --force-with-lease
