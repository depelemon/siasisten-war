name: Check TA Positions

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (UTC)
  workflow_dispatch: {}       # manual trigger for testing

permissions:
  contents: write             # needed to commit state.json back

concurrency:
  group: ta-check
  cancel-in-progress: false   # never cancel a run mid-flight

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          SIASISTEN_USERNAME: ${{ secrets.SIASISTEN_USERNAME }}
          SIASISTEN_PASSWORD: ${{ secrets.SIASISTEN_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      - name: Persist state
        run: |
          git config user.name  "siasisten-war-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git pull --rebase origin main
          git push
